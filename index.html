    <!-- Preconnect: نفتح اتصال DNS+TLS مع Google Fonts قبل أن يحتاجها CSS.
         الخط Cairo يُستورد من src/index.css عبر @import — preconnect
         يخفض زمن أول طلب إلى الخط بـ 100-300ms. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload خط Cairo CSS مباشرةً (بدل انتظار @import داخل index.css)
         فيتوازى تنزيل الخط مع تنزيل CSS التطبيق → FCP أسرع. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
    />

    <!-- Modulepreload: نخبر المتصفح أن main.tsx سيُطلب فوراً، فيبدأ
         تنزيله بالتوازي مع HTML بدل الانتظار حتى يصل وسم <script>. -->
    <link rel="modulepreload" href="/src/main.tsx" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#5b21b6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="البتول" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=2" />

  <meta name="twitter:description" content="البتول - نظام متكامل لإدارة اسبيرات المواتر والتكاتك والفواتير والمخزون">
